name: Build

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test:
    name: Graph-core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run tests
        run: dotnet test tests/RTAccess.Tests.csproj

  build:
    name: Build mod (Release)
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read      # lets the automatic GITHUB_TOKEN read our own WH40KRT.GameRefs package
    steps:
      - uses: actions/checkout@v4

      # Game reference assemblies come from WH40KRT.GameRefs — our own package of
      # Refasmer-stripped (metadata-only) assemblies, published to GitHub Packages
      # under this same account (see scripts/build-gamerefs.ps1). Because it's owned
      # by the workflow's own account and public, the built-in GITHUB_TOKEN reads it;
      # no PAT secret is needed. The registry still requires a token, hence the feed.
      - name: Add game-refs feed
        run: nuget sources add -name gamerefs -source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json -username ${{ github.repository_owner }} -password ${{ secrets.GITHUB_TOKEN }} -StorePasswordInClearText

      - name: Install game refs
        run: nuget install WH40KRT.GameRefs -Source gamerefs -OutputDirectory GameFiles -DependencyVersion Highest

      - name: Locate game refs
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\GameFiles" -Directory -Filter 'WH40KRT.GameRefs*' | Select-Object -First 1
          if (-not $pkg) { throw 'WH40KRT.GameRefs package not found under GameFiles/' }
          Write-Output "Using $($pkg.Name)"
          echo "GAME_DIR=$($pkg.FullName)" >> $env:GITHUB_ENV

      - name: Build
        shell: pwsh
        run: |
          $props = @(
            "-p:Configuration=Release",
            # The package mirrors the real layout: game refs in assemblies/, UnityModManager
            # under a UnityModManager/ subfolder of the "data dir".
            "-p:RogueTraderManagedDir=$env:GAME_DIR\assemblies",
            "-p:RogueTraderData=$env:GAME_DIR",
            # InstallDir: any non-empty value skips the Player.log-derived GamePath.props generation.
            "-p:RogueTraderInstallDir=$env:GAME_DIR",
            "-p:SolutionDir=$env:GITHUB_WORKSPACE\"
          )
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $props += "-p:Version=" + "${{ github.ref_name }}".TrimStart("v")
          }
          dotnet build RTAccess/RTAccess.csproj @props

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: mod-zip
          path: RTAccess/bin/RTAccess-*.zip
          if-no-files-found: error

  dev-release:
    name: Update rolling dev release
    if: github.ref == 'refs/heads/main'
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mod-zip
          path: dist
      - name: Stable asset name
        run: cp dist/RTAccess-*.zip RTAccess-dev.zip
      - name: Recreate dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev --yes --cleanup-tag -R ${{ github.repository }} || true
          gh release create dev RTAccess-dev.zip \
            -R ${{ github.repository }} \
            --target ${{ github.sha }} \
            --prerelease --latest=false \
            --title "Dev build (rolling)" \
            --notes "Automatic build of the latest \`main\` commit (${{ github.sha }}). Replaced on every push — expect pre-alpha rough edges."

  release:
    name: Tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mod-zip
          path: dist
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} dist/RTAccess-*.zip \
            -R ${{ github.repository }} \
            --title "RTAccess ${{ github.ref_name }}" \
            --generate-notes
