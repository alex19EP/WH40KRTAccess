name: Build

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test:
    name: Graph-core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run tests
        run: dotnet test tests/RTAccess.Tests.csproj

  build:
    name: Build mod (Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Game reference assemblies come from xADDBx's community package on GitHub
      # Packages (the same source ToyBox uses for its CI). The registry demands a
      # token even for public packages, and the workflow's own GITHUB_TOKEN is
      # repo-scoped — it cannot read another owner's packages. GH_PACKAGES_TOKEN
      # is a classic PAT with only the read:packages scope.
      - name: Add game-assemblies feed
        run: nuget sources add -name xaddbx -source https://nuget.pkg.github.com/xADDBx/index.json -username ${{ github.repository_owner }} -password ${{ secrets.GH_PACKAGES_TOKEN }} -StorePasswordInClearText

      - name: Install game assemblies
        run: nuget install RogueTraderGameAssemblies -Source xaddbx -OutputDirectory GameFiles -DependencyVersion Highest -DirectDownload -PreRelease

      - name: Locate game files
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\GameFiles" -Directory | Select-Object -First 1
          Write-Output "Using game assemblies: $($pkg.Name)"
          echo "GAME_DIR=$($pkg.FullName)" >> $env:GITHUB_ENV

      - name: Build
        shell: pwsh
        run: |
          $props = @(
            "-p:Configuration=Release",
            # ManagedDir: the package lays assemblies out flat (no WH40KRT_Data\Managed).
            "-p:RogueTraderManagedDir=$env:GAME_DIR\Assemblies",
            # InstallDir: any non-empty value skips the Player.log-derived GamePath.props generation.
            "-p:RogueTraderInstallDir=$env:GAME_DIR",
            # Data dir: supplies UnityModManager.dll and redirects the Deploy copy harmlessly.
            "-p:RogueTraderData=$env:GAME_DIR\UserDataDir",
            "-p:SolutionDir=$env:GITHUB_WORKSPACE\"
          )
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $props += "-p:Version=" + "${{ github.ref_name }}".TrimStart("v")
          }
          dotnet build RTAccess/RTAccess.csproj @props

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: mod-zip
          path: RTAccess/bin/RTAccess-*.zip
          if-no-files-found: error

  dev-release:
    name: Update rolling dev release
    if: github.ref == 'refs/heads/main'
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mod-zip
          path: dist
      - name: Stable asset name
        run: cp dist/RTAccess-*.zip RTAccess-dev.zip
      - name: Recreate dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev --yes --cleanup-tag -R ${{ github.repository }} || true
          gh release create dev RTAccess-dev.zip \
            -R ${{ github.repository }} \
            --target ${{ github.sha }} \
            --prerelease --latest=false \
            --title "Dev build (rolling)" \
            --notes "Automatic build of the latest \`main\` commit (${{ github.sha }}). Replaced on every push — expect pre-alpha rough edges."

  release:
    name: Tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mod-zip
          path: dist
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} dist/RTAccess-*.zip \
            -R ${{ github.repository }} \
            --title "RTAccess ${{ github.ref_name }}" \
            --generate-notes
